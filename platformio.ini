; PlatformIO 工程配置 — claude_code_buddy (M5Stack StickS3 固件)
; 详见 docs/claude_code_buddy/plans/firmware-development-plan.md FW-P0
;
; 目标硬件: M5Stack StickS3 (ESP32-S3, 135x240 ST7789, 扬声器 + 按钮)
; 技术栈: Arduino framework + M5Unified + M5GFX

[platformio]
default_envs = m5stack-sticks3

[env:m5stack-sticks3]
platform = espressif32
board = m5stack-sticks3
framework = arduino

; M5Unified 抽象 StickS3 的 LCD/按钮/扬声器/IMU；M5GFX 为其依赖（显式列出便于版本钉定）
lib_deps =
    m5stack/M5Unified
    m5stack/M5GFX

; USB CDC: StickS3 原生 USB serial，作为与 adapter 的 ccb-serial-v1 传输层
; ARDUINO_USB_CDC_ON_BOOT=1 使 `Serial` 映射为 USB CDC（host 端可见为 /dev/cu.usbmodem*）
; ARDUINO_USB_MODE=1 硬件模式 CDC
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

monitor_speed = 115200
upload_speed = 921600
